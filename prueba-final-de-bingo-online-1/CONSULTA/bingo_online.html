const bingoId = "bingo_89024213a66e45eeb4ccf06bf961d6fc";
const SUPABASE_URL = "https://lfgrsefomkgyngasbeab.supabase.co";
const SUPABASE_KEY = "sb_publishable_d0s8KuQk4UBIEm2-DTcypg_tbEC9i9i";
function normalizar(v) {
    let n = (v || "").replace(/\D/g, "");
    if (!n) return "";
    return n.padStart(4, "0");
}
function consultar() {
    const n = normalizar(document.getElementById("nro").value);
    const r = document.getElementById("res");
    if (!n) { r.className = "resultado warn"; r.innerText = "Ingrese número válido"; return; }
    if (!(n in datos)) { r.className = "resultado no"; r.innerText = "CARTÓN " + n + " NO EXISTE"; return; }
    if (datos[n] === "ACTIVO") { r.className = "resultado ok"; r.innerText = "✔ CARTÓN " + n + " ACTIVO"; }
    else { r.className = "resultado no"; r.innerText = "✖ CARTÓN " + n + " NO ACTIVO"; }
}
function actualizarTotales() {
    const valores = Object.values(datos);
    const activos = valores.filter(v => v === 'ACTIVO').length;
    const total = valores.length;
    const elTotal = document.getElementById('stat-total');
    const elActivos = document.getElementById('stat-activos');
    const elNoActivos = document.getElementById('stat-no-activos');
    if (elTotal) elTotal.textContent = total;
    if (elActivos) elActivos.textContent = activos;
    if (elNoActivos) elNoActivos.textContent = total - activos;
}
async function leerTodasLasFilasSupabase() {
    const filas = [];
    const tamPagina = 1000;
    for (let inicio = 0; ; inicio += tamPagina) {
        const fin = inicio + tamPagina - 1;
        const url = SUPABASE_URL + '/rest/v1/reservas_online?bingo_id=eq.' + encodeURIComponent(String(bingoId)) + '&select=id,carton,estado,creado_en&order=id.asc';
        const r = await fetch(url, {
            headers:{
                'apikey':SUPABASE_KEY,
                'Authorization':'Bearer '+SUPABASE_KEY,
                'Range': inicio + '-' + fin,
                'Range-Unit':'items'
            },
            cache:'no-store'
        });
        if (!r.ok) break;
        const pagina = await r.json();
        if (!Array.isArray(pagina) || pagina.length === 0) break;
        filas.push(...pagina);
        if (pagina.length < tamPagina) break;
    }
    return filas;
}
async function actualizarConsultaSupabase() {
    try {
        const filas = await leerTodasLasFilasSupabase();
        const ahora = Date.now();
        // Se recorren en orden ascendente: el último estado de cada cartón manda.
        const remoto = {};
        for (const x of filas) {
            const nro = normalizar(String(x.carton || ''));
            if (!nro || !(nro in datos)) continue;
            const estado = String(x.estado || '').toUpperCase();
            if (estado === 'ACTIVADO' || estado === 'PAGADO' || estado === 'VENDIDO') {
                remoto[nro] = 'ACTIVO';
            } else if (estado === 'PENDIENTE') {
                const creado = Date.parse(x.creado_en || '');
                remoto[nro] = (creado && ahora - creado <= 20 * 60 * 1000) ? 'NO ACTIVO' : 'NO ACTIVO';
            } else if (estado === 'ANULADO' || estado === 'LIBRE' || estado === 'CANCELADO' || estado === 'DESACTIVADO') {
                remoto[nro] = 'NO ACTIVO';
            }
        }
        for (const [nro, estado] of Object.entries(remoto)) datos[nro] = estado;
        actualizarTotales();
    } catch (e) { console.log('Consulta Supabase:', e); }
}
document.getElementById("nro").addEventListener("keydown", function(e) { if (e.key === "Enter") consultar(); });
actualizarTotales();
actualizarConsultaSupabase();
setInterval(actualizarConsultaSupabase, 5000);
</script>
